name: Daily temperature update

on:
  schedule:
    - cron: "5 23 * * *"   # minden nap 23:05
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run updater
        run: python update_csv.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outside_history.csv
          git commit -m "Daily temp update" || exit 0
          git push
